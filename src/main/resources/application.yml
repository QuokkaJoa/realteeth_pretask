spring:
  application:
    name: pre-task_realteath
  datasource:
    url: jdbc:mysql://localhost:3306/assignment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  jackson:
    deserialization:
      read-unknown-enum-values-using-default-value: true

mock-worker:
  api-key: ${MOCK_WORKER_API_KEY:myApiKey}
  base-url: https://dev.realteeth.ai/mock

job:
  scheduler:
    dispatch-delay-ms: 1000
    poll-delay-ms: 30000
    timeout-check-delay-ms: 60000
    chunk-size: 100
    timeout-minutes: 30
