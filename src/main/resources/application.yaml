spring:
  application:
    name: pre-task_realteath
  datasource:
    url: jdbc:mysql://localhost:3306/assignment_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

mock-worker:
  api-key: ${MOCK_WORKER_API_KEY:myApiKey}
  base-url: https://dev.realteeth.ai/mock
