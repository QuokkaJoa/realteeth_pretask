spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

mock-worker:
  base-url: https://dev.realteeth.ai/mock
  api-key: ${MOCK_WORKER_API_KEY:test_api_key}
