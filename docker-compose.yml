services:
  mysql:
    image: mysql:8.0
    container_name: assignment-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: assignment_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: assignment-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/assignment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      MOCK_WORKER_API_KEY: ${MOCK_WORKER_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
